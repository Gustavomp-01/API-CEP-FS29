<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API ViaCEP</title>
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>
    <h2>API ViaCEP</h2>

    <form id="formCadastro">

        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Insira o seu Nome">

        <br><br>

        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Meu@email.com">

        <br><br>
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Informe uma senha forte">

        <hr>
        <label for="cep">CEP</label>
        <input type="number" id="cep" placeholder="Ex: 12345678" >

        <hr>

        <label for="logradouro">Logradouro</label>
        <input type="text" id="logradouro">
        
        <br><br> 

        <label for="numero">Número</label>
        <input type="number" id="numero" size="5">

        <label for="complemento">Complemento</label>
        <input type="text" id="complemento" placeholder="Ap, Bloco, Quadra ...">

        <br><br>

        <label for="bairro">Bairro</label>
        <input type="text" id="bairro">

        <br><br>

        <label for="cidade">Cidade</label>
        <input type="text" id="cidade">

        <label for="uf">UF</label>
        <input type="text" id="uf" pattern="[A-Z] {2}" size="2">
        <!-- Pattern (Cria um padrão, que o input vai aceitar) -->

        <hr>
        <button type="submit">Cadastrar</button>
        <button type="reset">Limpar</button>



        



    </form>
</body>
<!-- Arquivo JS -->
<script src="./JS/app.js"></script>
</html>
